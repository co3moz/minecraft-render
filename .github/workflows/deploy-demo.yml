name: Deploy demo to GitHub Pages

on:
  push:
    branches: [master]
    paths:
      - 'demo/**'
      - '.github/workflows/deploy-demo.yml'
  workflow_dispatch:

# Allow the workflow to publish to GitHub Pages.
permissions:
  contents: read
  pages: write
  id-token: write

# One deploy at a time; a newer push cancels an in-flight run.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            package-lock.json
            demo/package-lock.json

      # The demo consumes the library via `file:..` → its built `dist/`, so
      # build the library first. `--ignore-scripts` skips compiling the native
      # Node-only deps (gl, skia-canvas); they aren't used by the browser build,
      # tsc only needs their type declarations.
      - name: Build library
        run: |
          npm ci --ignore-scripts
          npm run build

      - name: Build demo
        working-directory: demo
        env:
          BASE_PATH: /${{ github.event.repository.name }}/
        run: |
          npm ci
          npm run build

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: demo/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
