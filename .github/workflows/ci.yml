name: Test

on: [push]

jobs:
  test:
    # Pinned to 22.04 (GCC 11): `gl` (headless-gl) v6 bundles an old ANGLE that
    # fails to compile on ubuntu-24.04's GCC 13+ (missing <cstdint> for
    # uintptr_t). There is no prebuilt binary for this Node version, so it is
    # always built from source.
    runs-on: ubuntu-22.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      # gl builds from source and needs X11 + Mesa GL/GLEW headers. Installed
      # unconditionally: the -dev packages also pull in the runtime .so files gl
      # loads at test time, which are needed even when node_modules is cached.
      - name: Install headless-gl system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential pkg-config \
            libx11-dev libxi-dev libxext-dev \
            libgl1-mesa-dev libglu1-mesa-dev libglew-dev \
            xvfb
      # Cache the built node_modules (including gl's compiled binary) so the
      # expensive native build only runs when package-lock.json changes.
      - name: Cache node_modules
        id: node-modules
        uses: actions/cache@v4
        with:
          path: node_modules
          key: node-modules-ubuntu-22.04-node22-${{ hashFiles('package-lock.json') }}
      - name: Install dependencies
        if: steps.node-modules.outputs.cache-hit != 'true'
        run: npm ci
      - run: xvfb-run --auto-servernum npm test
      - name: Archive production artifacts
        uses: actions/upload-artifact@v4
        with:
          name: test-result
          path: |
            test-data/*
            !test-data/test.jar
            !test-data/.gitignore
