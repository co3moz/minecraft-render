name: Test

on: [push]

jobs:
  test:
    # Pinned to 22.04 (GCC 11): `gl` (headless-gl) v6 bundles an old ANGLE that
    # fails to compile on ubuntu-24.04's GCC 13+ (missing <cstdint> for
    # uintptr_t). There is no prebuilt binary for this Node version, so it is
    # always built from source.
    runs-on: ubuntu-22.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      # gl builds from source and needs X11 + Mesa GL/GLEW headers; install
      # them before `npm ci` runs gl's build script.
      - name: Install headless-gl build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential pkg-config \
            libx11-dev libxi-dev libxext-dev \
            libgl1-mesa-dev libglu1-mesa-dev libglew-dev \
            xvfb
      - run: npm ci
      - run: xvfb-run --auto-servernum npm test
      - name: Archive production artifacts
        uses: actions/upload-artifact@v4
        with:
          name: test-result
          path: |
            test-data/*
            !test-data/test.jar
            !test-data/.gitignore
