name: Test

on: [push]

# Needed by the deploy job to publish to GitHub Pages via OIDC.
permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent Pages deployment; newer pushes cancel in-progress runs.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  test:
    # Pinned to 22.04 (GCC 11): `gl` (headless-gl) v6 bundles an old ANGLE that
    # fails to compile on ubuntu-24.04's GCC 13+ (missing <cstdint> for
    # uintptr_t). There is no prebuilt binary for this Node version, so it is
    # always built from source.
    runs-on: ubuntu-22.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      # gl builds from source and needs X11 + Mesa GL/GLEW headers. Installed
      # unconditionally: the -dev packages also pull in the runtime .so files gl
      # loads at test time, which are needed even when node_modules is cached.
      - name: Install headless-gl system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential pkg-config \
            libx11-dev libxi-dev libxext-dev \
            libgl1-mesa-dev libglu1-mesa-dev libglew-dev \
            xvfb
      # Cache the built node_modules (including gl's compiled binary) so the
      # expensive native build only runs when package-lock.json changes.
      - name: Cache node_modules
        id: node-modules
        uses: actions/cache@v4
        with:
          path: node_modules
          key: node-modules-ubuntu-22.04-node22-${{ hashFiles('package-lock.json') }}
      - name: Install dependencies
        if: steps.node-modules.outputs.cache-hit != 'true'
        run: npm ci
      # 1000x1000 renders are wasteful for the CI gallery; 256x256 is plenty for
      # the preview grid and keeps the produced site small and the run fast.
      - run: xvfb-run --auto-servernum npm test
        env:
          WIDTH: '256'
          HEIGHT: '256'
      - name: Archive production artifacts
        uses: actions/upload-artifact@v4
        with:
          name: test-result
          path: |
            test-data/*
            !test-data/*.jar
            !test-data/.gitignore
      # Assemble the gallery site from just the rendered PNGs + index.html.
      # index.html references every image by same-directory relative name, so
      # the test/ subdir and the .jar files are not needed and are left out.
      - name: Assemble Pages site
        if: github.ref == 'refs/heads/master'
        run: |
          mkdir -p _site
          cp test-data/index.html _site/
          cp test-data/*.png _site/
      - name: Upload Pages artifact
        if: github.ref == 'refs/heads/master'
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  # Publishes the assembled gallery to GitHub Pages. Runs only on master and
  # only after tests pass.
  deploy:
    if: github.ref == 'refs/heads/master'
    needs: test
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
