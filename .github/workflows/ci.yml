name: Test

on: [push]

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      # `gl` (headless-gl) has no prebuilt binary for this Node version and
      # falls back to building from source, which needs X11 + Mesa GL/GLEW
      # headers. These must be installed before `npm ci` runs gl's build script.
      - name: Install headless-gl build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential pkg-config \
            libx11-dev libxi-dev libxext-dev \
            libgl1-mesa-dev libglu1-mesa-dev libglew-dev \
            xvfb
      - run: npm ci
      - run: xvfb-run --auto-servernum npm test
      - name: Archive production artifacts
        uses: actions/upload-artifact@v4
        with:
          name: test-result
          path: |
            test-data/*
            !test-data/test.jar
            !test-data/.gitignore
